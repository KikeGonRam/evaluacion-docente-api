spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

app.openapi.title=API de Evaluacion Docente
app.openapi.version=1.0
app.openapi.description=Sistema de evaluacion academica UTVT
app.openapi.contact.name=IDGS-84
app.openapi.contact.email=idgs84@utvt.edu.mx

app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:3000
